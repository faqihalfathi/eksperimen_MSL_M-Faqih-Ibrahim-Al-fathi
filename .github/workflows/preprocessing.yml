name: Preprocessing Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'california_housing_raw/**'
      - 'preprocessing/**'
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib

      - name: Run preprocessing
        run: |
          cd preprocessing
          python "automate_M. Faqih Ibrahim Al-fathi.py"

      - name: Commit preprocessed dataset
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add preprocessing/california_housing_preprocessing/
          git diff --staged --quiet || git commit -m "Auto-update: preprocessed dataset [skip ci]"
          git push
